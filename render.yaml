services:
  - type: web
    name: transcribe-test
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: MAX_UPLOAD_MB
        value: "500"
      - key: CORS_ORIGIN
        value: "*"
      - key: TRANSCRIBE_MODEL
        value: "gpt-4o-transcribe-diarize"
      - key: ANALYZE_MODEL
        value: "gpt-4o"
      - key: CHUNK_SECONDS
        value: "1380"
